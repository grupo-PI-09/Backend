spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rr_maxx}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:160795}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
#update, create-drop,validate, none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

apibrasil.base-url=${APIBRASIL_BASE_URL:https://gateway.apibrasil.io/api/v2}
apibrasil.token=${APIBRASIL_TOKEN:}
apibrasil.placa-endpoint=${APIBRASIL_PLACA_ENDPOINT:/vehicles/base/001/consulta}
apibrasil.placa-tipo=${APIBRASIL_PLACA_TIPO:fipe}
apibrasil.timeout.connect=3s
apibrasil.timeout.read=10s
